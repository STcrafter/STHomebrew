name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]  # èëè master, åñëè ó âàñ òàê

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # <-- Право на запись в репозиторий
      pages: write           # <-- Право на деплой в GitHub Pages
      id-token: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install   # вместо npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
